version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: mysql_bai08
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: mydb
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    restart: always

  app:
    build: .
    container_name: node_mysql_app_bai08
    ports:
      - "3001:3000"
    environment:
      DB_HOST: db
      DB_NAME: mydb
      DB_USER: user
      DB_PASSWORD: password
    depends_on:
      - db
    restart: always
